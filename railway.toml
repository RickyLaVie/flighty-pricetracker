[build]
builder = "dockerfile"

[deploy]
startCommand = "apt-get install -y libglib2.0-0 libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 2>/dev/null; npx prisma migrate deploy && npx tsx server.ts"
restartPolicyType = "always"
